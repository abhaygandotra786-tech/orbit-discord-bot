<svg width="1200" height="420" viewBox="0 0 1200 420" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Orbit">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1c1210"/>
      <stop offset="100%" stop-color="#120c0b"/>
    </linearGradient>
    <radialGradient id="glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#FF6A3D" stop-opacity="0.42"/>
      <stop offset="100%" stop-color="#FF6A3D" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="mBody" cx="38%" cy="30%" r="78%">
      <stop offset="0%" stop-color="#FFCC7A"/>
      <stop offset="46%" stop-color="#FF7A3D"/>
      <stop offset="100%" stop-color="#E73B27"/>
    </radialGradient>
    <linearGradient id="mRing" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#FFB648"/>
      <stop offset="100%" stop-color="#FF4D2D"/>
    </linearGradient>
    <linearGradient id="word" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#FFCE86"/>
      <stop offset="55%" stop-color="#FF7A3D"/>
      <stop offset="100%" stop-color="#FF4D2D"/>
    </linearGradient>
  </defs>

  <rect width="1200" height="420" fill="url(#bg)"/>
  <ellipse cx="930" cy="210" rx="420" ry="320" fill="url(#glow)"/>

  <!-- wordmark -->
  <text x="96" y="212" font-family="Arial, Helvetica, sans-serif" font-size="132" font-weight="800" fill="url(#word)" letter-spacing="2">ORBIT</text>
  <text x="100" y="270" font-family="Arial, Helvetica, sans-serif" font-size="27" font-weight="700" fill="#FFD9A6" letter-spacing="9">CONNECT · DISCOVER · GROW</text>

