<!DOCTYPE html>
<html lang="en" data-theme="home">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Payment successful — Orbit</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="/css/styles.css" />
    <style>
        .success-wrap {
            min-height: 100vh;
            display: grid;
            place-items: center;
            padding: 24px;
            position: relative;
            overflow: hidden;
            background:
                radial-gradient(80% 100% at 50% 0%, rgba(109,99,245,0.22), transparent 60%),
                var(--bg);
        }
        .success-card {
            position: relative;
            z-index: 2;
            width: 100%;
            max-width: 460px;
            text-align: center;
            background: var(--surface);
            border: 1px solid var(--line);
            border-radius: 20px;
            padding: 44px 36px;
            box-shadow: 0 30px 80px rgba(109,99,245,0.25);
        }
        .check {
            width: 84px; height: 84px; margin: 0 auto 22px;
            border-radius: 50%;
            background: var(--grad);
            display: grid; place-items: center;
            box-shadow: 0 12px 40px rgba(109,99,245,0.5);
            animation: pop 0.5s cubic-bezier(.2,.8,.2,1.2);
        }
        .check svg { width: 42px; height: 42px; }
        @keyframes pop { 0% { transform: scale(0); } 100% { transform: scale(1); } }
        .success-card h1 { font-size: 26px; font-weight: 800; margin: 0 0 10px; letter-spacing: -0.02em; }
        .success-card p { color: var(--text-2); margin: 0 0 26px; font-size: 15.5px; }
        .success-actions { display: flex; flex-direction: column; gap: 12px; }
        .spark { position: absolute; width: 10px; height: 10px; border-radius: 2px; opacity: 0; animation: fall 2.6s ease-in forwards; }
        @keyframes fall {
            0% { opacity: 1; transform: translateY(-20vh) rotate(0deg); }
            100% { opacity: 0; transform: translateY(80vh) rotate(360deg); }
        }
    </style>
</head>
<body>
    <div class="success-wrap">
        <div id="confetti"></div>
        <div class="success-card">
            <div class="check">
                <svg viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="3" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M20 6L9 17l-5-5" />
                </svg>
            </div>
            <h1>You're in. 🎉</h1>
            <p id="msg">Your membership is being activated. It unlocks in your Discord account within a few seconds — no need to do anything.</p>
            <div class="success-actions">
                <a class="btn lg" id="discordBtn" href="#" target="_blank" rel="noopener">Return to Discord</a>
                <a class="btn ghost lg" href="/">Back to Orbit</a>
            </div>
        </div>
    </div>

    <script>
        (async () => {
            try {
                const cfg = await (await fetch("/api/config")).json();
                document.title = `Payment successful — ${cfg.botName}`;
                const btn = document.getElementById("discordBtn");
                btn.href = cfg.supportServer || cfg.website || "/";
                document.getElementById("msg").textContent =
                    `Your ${cfg.botName} membership is being activated. It unlocks in your Discord account within a few seconds — run /premium status to confirm.`;
            } catch (_) {}

            // Lightweight confetti
            const holder = document.getElementById("confetti");
            const colors = ["#6d63f5", "#9466ff", "#8b80ff", "#c4b5fd", "#ffffff"];
            for (let i = 0; i < 60; i++) {
                const s = document.createElement("span");
                s.className = "spark";
                s.style.left = Math.random() * 100 + "vw";
                s.style.background = colors[i % colors.length];
                s.style.animationDelay = Math.random() * 1.2 + "s";
                holder.appendChild(s);
            }
        })();
    </script>
</body>
</html>
